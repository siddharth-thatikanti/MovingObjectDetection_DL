body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0b0f1a;
  color: white;
}

.bg-video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

.overlay {
  text-align: center;
  margin-top: 20%;
}

.glow-text {
  font-size: 3rem;
  color: cyan;
  text-shadow: 0 0 20px cyan;
  animation: pulse 2s infinite;
}

.typing {
  margin-top: 20px;
  font-size: 1.2rem;
  animation: blink 1s infinite;
}

.loader {
  margin: 30px auto;
  width: 60px;
  height: 60px;
  border: 6px solid #333;
  border-top: 6px solid cyan;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@keyframes pulse {
  0% { text-shadow: 0 0 10px cyan; }
  50% { text-shadow: 0 0 30px cyan; }
}

.container {
  display: flex;
  justify-content: center;
  gap: 30px;
  padding: 80px;
}

.card {
  background: rgba(255,255,255,0.08);
  padding: 30px;
  border-radius: 15px;
  backdrop-filter: blur(15px);
  width: 260px;
  transition: 0.4s;
}

.card:hover {
  transform: translateY(-15px) scale(1.05);
  box-shadow: 0 0 30px cyan;
}

button {
  background: cyan;
  border: none;
  padding: 10px;
  width: 100%;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #00ffee;
}

/* ================= PROJECT INFO SECTION ================= */

.project-info {
  margin-top: 80px;
  text-align: center;
  animation: fadeUp 1.5s ease;
}

.animated-title {
  font-size: 2.5rem;
  color: cyan;
  text-shadow: 0 0 25px cyan;
  animation: glow 2s infinite alternate;
}

.typing-text {
  margin-top: 20px;
  font-size: 1.3rem;
  color: #c9faff;
  min-height: 40px;
}

/* Stats */
.stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 40px;
}

.stat-box {
  background: rgba(255,255,255,0.08);
  padding: 25px;
  border-radius: 15px;
  width: 180px;
  backdrop-filter: blur(10px);
  transition: 0.4s;
}

.stat-box:hover {
  transform: translateY(-10px) scale(1.05);
  box-shadow: 0 0 25px cyan;
}

.stat-box h2 {
  font-size: 2.2rem;
  color: cyan;
}

/* Pipeline */
.pipeline {
  margin-top: 50px;
  font-size: 1.2rem;
  display: flex;
  justify-content: center;
  gap: 15px;
  animation: slide 8s linear infinite;
}

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes glow {
  from { text-shadow: 0 0 10px cyan; }
  to { text-shadow: 0 0 30px cyan; }
}

@keyframes slide {
  0% { opacity: 0.2; }
  50% { opacity: 1; }
  100% { opacity: 0.2; }
}
