<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enhanced YOLOv9 AI Dashboard</title>

  <!-- CSS -->
  <link rel="stylesheet" href="/static/css/style.css">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- ================= HEADER ================= -->
<header class="navbar">
  🚀 Enhanced YOLOv9 Real-World Object Detection System
</header>

<!-- ================= MAIN CARDS ================= -->
<div class="container">

  <!-- IMAGE -->
  <div class="card">
    <h2>📷 Upload Image</h2>
    <form action="/run" method="post" enctype="multipart/form-data">
      <input type="hidden" name="mode" value="image">
      <input type="file" name="file" required>
      <button type="submit">Run Detection</button>
    </form>
  </div>

  <!-- VIDEO -->
  <div class="card">
    <h2>🎥 Upload Video</h2>
    <form action="/run" method="post" enctype="multipart/form-data">
      <input type="hidden" name="mode" value="video">
      <input type="file" name="file" required>
      <button type="submit">Run Detection</button>
    </form>
  </div>

  <!-- WEBCAM -->
  <div class="card">
    <h2>📡 Live Webcam</h2>
    <a href="/webcam">
      <button>Start Webcam</button>
    </a>
  </div>

</div>

<!-- ================= PROJECT DESCRIPTION ================= -->
<section class="project-info">

  <h1 class="animated-title">
    AI-Powered Enhanced Object Detection
  </h1>

  <p class="typing-text" id="typing"></p>

  <!-- ================= STATS ================= -->
  <div class="stats">

    <div class="stat-box">
      <h2 class="counter" data-target="80">0</h2>
      <p>Real-World Classes</p>
    </div>

    <div class="stat-box">
      <h2 class="counter" data-target="160">0</h2>
      <p>FPS Inference</p>
    </div>

    <div class="stat-box">
      <h2 class="counter" data-target="99">0</h2>
      <p>% Detection Reliability*</p>
    </div>

  </div>

  <!-- ================= PIPELINE ================= -->
  <div class="pipeline">
    <span>🎥 Video / Image</span>
    <span>➡</span>
    <span>✨ Enhancement</span>
    <span>➡</span>
    <span>🧠 YOLOv9 AI</span>
    <span>➡</span>
    <span>📦 Detection + Tracking</span>
  </div>

</section>

<!-- ================= FOOTER ================= -->
<footer class="footer">
  © 2026 | Enhanced YOLOv9 AI System | Real-Time Video Intelligence
</footer>

<!-- ================= JS ================= -->
<script>
/* ================= TYPING EFFECT ================= */
const text =
  "A real-time enhanced YOLOv9 system designed to detect people, animals, vehicles, and everyday objects from real-world images and videos using motion-aware preprocessing and intelligent tracking.";

let index = 0;
const typingElement = document.getElementById("typing");

function typeEffect() {
  if (index < text.length) {
    typingElement.innerHTML += text.charAt(index);
    index++;
    setTimeout(typeEffect, 35);
  }
}
typeEffect();

/* ================= COUNTER EFFECT ================= */
const counters = document.querySelectorAll(".counter");

counters.forEach(counter => {
  const updateCounter = () => {
    const target = +counter.dataset.target;
    const current = +counter.innerText;
    const increment = target / 100;

    if (current < target) {
      counter.innerText = Math.ceil(current + increment);
      setTimeout(updateCounter, 25);
    } else {
      counter.innerText = target;
    }
  };
  updateCounter();
});
</script>

</body>
</html>
